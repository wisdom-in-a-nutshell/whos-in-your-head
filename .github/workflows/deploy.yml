name: Build and Deploy to Azure Web App

on:
  push:
    branches: [main]
    paths-ignore:
      - ".agents/**"
      - ".codex/**"
      - "**/.agents/**"
      - "**/.codex/**"
      - "**/*.md"
      - "docs/**"
      - "AGENTS.md"
      - "**/*.test.ts"
      - "**/*.test.tsx"
      - "vitest.config.*"
      - "scripts/check-fast.sh"
      - "scripts/check-full.sh"
      - "scripts/game-telemetry.mjs"
      - "scripts/prod-logs.mjs"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: ghost
  AZURE_WEBAPP_NAME: whos-in-your-head-adi
  ACR_NAME: aipodcasting
  ACR_LOGIN_SERVER: aipodcasting.azurecr.io
  IMAGE_NAME: whos-in-your-head

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Production
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true
    env:
      # Azure identifiers are repo variables, not GitHub Secrets.
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify app
        run: |
          npm run typecheck
          npm test
          npm run lint
          npm run build

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ACR with Azure identity
        run: az acr login --name "$ACR_NAME"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=whos-in-your-head
          cache-to: type=gha,mode=max,scope=whos-in-your-head

      - name: Update Web App container image
        run: |
          az webapp config container set \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --container-image-name "$ACR_LOGIN_SERVER/$IMAGE_NAME:${GITHUB_SHA}" \
            --container-registry-url "https://$ACR_LOGIN_SERVER"
